    <script>
        var dzwieki = {};
        var aktywnoscZestawu = {};

        function toggleDzwiek(sciezka, przycisk) {
    var ikona = przycisk.querySelector('img');
    if (dzwieki[sciezka]) {
        zatrzymajDzwiek(sciezka, przycisk);
    } else {
        // Resetuj aktywność zestawów dźwięków
        for (var zestaw in aktywnoscZestawu) {
            aktywnoscZestawu[zestaw] = false;
        }
        dzwieki[sciezka] = new Audio(sciezka);
        dzwieki[sciezka].loop = true; // Ustawienie zapętlenia dźwięku
        dzwieki[sciezka].play();
        ikona.src = "http://goliat.uwb.pl/wp-content/uploads/2024/03/notification.png";
        przycisk.classList.add('aktywny');
    }
}



        function zatrzymajDzwiek(sciezka, przycisk) {
            var ikona = przycisk.querySelector('img');
            if (dzwieki[sciezka]) {
                dzwieki[sciezka].pause();
                dzwieki[sciezka].currentTime = 0;
                dzwieki[sciezka] = null;
                ikona.src = "http://goliat.uwb.pl/wp-content/uploads/2024/03/notification-2.png";
                przycisk.classList.remove('aktywny');
            }
        }

 



    </script>

    <script>
        var dzwieki = {};
        var aktywnoscZestawu = {};

        function toggleDzwiek(sciezka, przycisk) {
    var ikona = przycisk.querySelector('img');
    if (dzwieki[sciezka]) {
        zatrzymajDzwiek(sciezka, przycisk);
    } else {
        // Resetuj aktywność zestawów dźwięków
        for (var zestaw in aktywnoscZestawu) {
            aktywnoscZestawu[zestaw] = false;
        }
        dzwieki[sciezka] = new Audio(sciezka);
        dzwieki[sciezka].loop = true; // Ustawienie zapętlenia dźwięku
        dzwieki[sciezka].play();
        ikona.src = "http://goliat.uwb.pl/wp-content/uploads/2024/03/notification.png";
        przycisk.classList.add('aktywny');
    }
}



        function zatrzymajDzwiek(sciezka, przycisk) {
            var ikona = przycisk.querySelector('img');
            if (dzwieki[sciezka]) {
                dzwieki[sciezka].pause();
                dzwieki[sciezka].currentTime = 0;
                dzwieki[sciezka] = null;
                ikona.src = "http://goliat.uwb.pl/wp-content/uploads/2024/03/notification-2.png";
                przycisk.classList.remove('aktywny');
            }
        }

 



    </script>
