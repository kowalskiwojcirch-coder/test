<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Konfigurator Harmonii Dzwonów</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

        body {
            display: none; 
            font-family: 'Montserrat', sans-serif;
            background-color: #fcfcfc;
            margin: 0;
            padding: 20px;
            user-select: none; 
            -webkit-user-select: none;
        }

        .konfigurator-container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            padding: 30px 20px;
        }

        .konfigurator-header h3 {
            color: #4A4A4A;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .grupa-dzwieku {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        /* STYL PODSTAWOWY */
        .bell-btn {
            background: #ffffff;
            border: 1px solid #C7912B;
            border-radius: 4px;
            width: 140px;
            height: 52px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .bell-btn svg {
            width: 26px;
            height: 26px;
            fill: #999;
        }

        .bell-btn span {
            font-size: 18px;
            color: #333;
            font-weight: 400;
        }

        /* --- STYL AKTYWNY (ZGODNIE ZE ZDJĘCIEM) --- */
        .bell-btn.aktywny {
            background-color: #e0e0e0 !important; /* Szare tło przycisku */
            border: 1px solid #C7912B;
        }

        /* Specjalny kolor dzwonka po aktywacji */
        .bell-btn.aktywny svg .bell-main {
            fill: #FFD25A; /* Jasny żółty */
        }
        .bell-btn.aktywny svg .bell-detail {
            fill: #F6A828; /* Pomarańczowy detal */
        }
        .bell-btn.aktywny svg .bell-clapper {
            fill: #D48C15; /* Serce dzwonu */
        }
        .bell-btn.aktywny svg .bell-lines {
            fill: #1B4E5E; /* Niebieskie kreski dzwonienia */
            display: block !important;
        }

        /* Domyślnie ukrywamy niebieskie kreski dzwonienia */
        .bell-lines {
            display: none;
        }

    </style>
</head>
<body oncontextmenu="return false;">

<script>
    // --- BLOKADY I HASŁO ---
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    const poprawneHaslo = "Betadzwonnykieczyński";
    let autoryzowany = false;

    while (!autoryzowany) {
        let wpisane = prompt("Wpisz Hasło:");
        if (wpisane === poprawneHaslo) {
            autoryzowany = true;
            document.body.style.display = "block";
        } else {
            alert("Błędny kod!");
        }
    }
</script>

<div class="konfigurator-container">
    <div class="konfigurator-header">
        <h3>POSŁUCHAJ ZESTAWÓW HARMONICZNYCH</h3>
    </div>
    <div id="konfiguratorDzwiekow" class="grupa-dzwieku"></div>
</div>

<script>
    const wagi = [20, 25, 30, 35, 40, 45, 50, 60, 70, 80, 90, 100, 130, 150, 190, 220, 260, 290, 350, 420, 500, 580, 700, 800, 970, 1200, 1450, 1650, 1950, 2400, 2800, 3360, 4000, 4640, 5600, 6400, 7760, 9600, 11500];
    const container = document.getElementById('konfiguratorDzwiekow');
    const grajaceInstance = {};

    const posortowane = [...wagi].sort((a, b) => b - a);

    posortowane.forEach((waga, index) => {
        const btn = document.createElement('button');
        btn.className = 'bell-btn';
        
        const n = index;
        const pitch = 0.5 * Math.pow(2, n / 12);
        
        // Budujemy dzwonek SVG z warstwami, aby móc zmieniać kolory jak na zdjęciu
        btn.innerHTML = `
            <svg viewBox="0 0 100 100">
                <path class="bell-lines" d="M15,35 Q5,45 15,55 M85,35 Q95,45 85,55" fill="none" stroke="#1B4E5E" stroke-width="5" stroke-linecap="round"/>
                <path class="bell-main" d="M50,15 C35,15 25,30 25,50 C25,65 20,75 15,80 L85,80 C80,75 75,65 75,50 C75,30 65,15 50,15 Z" fill="#999"/>
                <path class="bell-detail" d="M50,15 C58,15 75,30 75,50 C75,65 80,75 85,80 L50,80 Z" fill="#888"/>
                <circle class="bell-clapper" cx="50" cy="85" r="7" fill="#777"/>
            </svg>
            <span>${waga} kg</span>
        `;

        btn.onclick = () => {
            if (grajaceInstance[waga]) {
                grajaceInstance[waga].pause();
                grajaceInstance[waga].currentTime = 0;
                delete grajaceInstance[waga];
                btn.classList.remove('aktywny');
            } else {
                const audio = new Audio('dzwon.mp3');
                audio.loop = true;
                audio.preservesPitch = false;
                audio.playbackRate = pitch;
                audio.play().then(() => {
                    grajaceInstance[waga] = audio;
                    btn.classList.add('aktywny');
                });
            }
        };

        container.prepend(btn);
    });
</script>

</body>
</html>
