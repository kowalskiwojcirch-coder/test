<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

    .konfigurator-container {
        font-family: 'Montserrat', sans-serif;
        max-width: 1000px;
        margin: 0 auto;
        text-align: center;
        padding: 20px;
    }

    .konfigurator-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
    }

    .konfigurator-header h3 {
        color: #4A4A4A;
        font-size: 1.2rem;
        letter-spacing: 1px;
        margin-top: 10px;
    }

    .grupa-dzwieku {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 12px;
        justify-content: center;
    }

    .bell-btn {
        background: #ffffff;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        padding: 12px 8px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
        color: #4A4A4A;
    }

    .bell-btn:hover {
        border-color: #C7912B;
        background-color: #f9f9f9;
    }

    .bell-btn svg {
        width: 24px;
        height: 24px;
        fill: #999;
    }

    .bell-btn.aktywny {
        border-color: #C7912B;
        background-color: #fffdf2;
        color: #C7912B;
        font-weight: 600;
        box-shadow: 0 0 10px rgba(199, 145, 43, 0.2);
    }

    .bell-btn.aktywny svg {
        fill: #C7912B;
        animation: ring-animation 0.6s ease infinite;
    }

    @keyframes ring-animation {
        0% { transform: rotate(0); }
        25% { transform: rotate(15deg); }
        75% { transform: rotate(-15deg); }
        100% { transform: rotate(0); }
    }
</style>

<div class="konfigurator-container">
    <div class="konfigurator-header">
        <svg viewBox="0 0 24 24" width="50" height="50" fill="#C7912B"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <h3>POSŁUCHAJ ZESTAWÓW HARMONICZNYCH</h3>
    </div>

    <div id="konfiguratorDzwiekow" class="grupa-dzwieku"></div>
</div>

<script>
    const wagi = [20, 25, 30, 35, 40, 45, 50, 60, 70, 80, 90, 100, 130, 150, 190, 220, 260, 290, 350, 420, 500, 580, 700, 800, 970, 1200, 1450, 1650, 1950, 2400, 2800, 3360, 4000, 4640, 5600, 6400, 7760, 9600, 11500];
    const container = document.getElementById('konfiguratorDzwiekow');
    const grajaceInstance = {};

    wagi.forEach(waga => {
        const btn = document.createElement('button');
        btn.className = 'bell-btn';
        
        // Obliczanie współczynnika wysokości (pitch)
        // Im wyższa waga, tym niższa wartość (niższy ton)
        let pitchFactor = 1.0;
        if (waga <= 100) pitchFactor = 1.7;      
        else if (waga <= 500) pitchFactor = 1.3; 
        else if (waga <= 2000) pitchFactor = 0.9; 
        else if (waga <= 5000) pitchFactor = 0.7; 
        else pitchFactor = 0.5;                   

        btn.innerHTML = `
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span>${waga} kg</span>
        `;

        btn.onclick = () => {
            if (grajaceInstance[waga]) {
                // STOP
                grajaceInstance[waga].pause();
                grajaceInstance[waga].currentTime = 0;
                delete grajaceInstance[waga];
                btn.classList.remove('aktywny');
            } else {
                // START
                const audio = new Audio('dzwon.mp3');
                audio.loop = true;
                
                // Ustawienie wysokości dźwięku (pitch)
                audio.playbackRate = pitchFactor;
                // Wyłączenie zachowania oryginalnej wysokości (kluczowe dla zmiany tonu)
                audio.preservesPitch = false; 
                
                audio.play().then(() => {
                    grajaceInstance[waga] = audio;
                    btn.classList.add('aktywny');
                }).catch(e => console.log("Czekam na kliknięcie użytkownika..."));
            }
        };

        container.appendChild(btn);
    });
</script>
