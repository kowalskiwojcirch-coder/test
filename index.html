<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Harmonia Dzwonów Kieczyński</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

        /* Domyślnie ukrywamy wszystko, żeby nikt nie podejrzał wag przed wpisaniem hasła */
        body {
            display: none; 
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .konfigurator-container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .konfigurator-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .konfigurator-header h3 {
            color: #4A4A4A;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .grupa-dzwieku {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            justify-content: center;
        }

        .bell-btn {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            color: #4A4A4A;
        }

        .bell-btn:hover {
            border-color: #C7912B;
            background-color: #f9f9f9;
            transform: translateY(-2px);
        }

        .bell-btn svg {
            width: 24px;
            height: 24px;
            fill: #999;
        }

        .bell-btn.aktywny {
            border-color: #C7912B;
            background-color: #fffdf2;
            color: #C7912B;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(199, 145, 43, 0.2);
        }

        .bell-btn.aktywny svg {
            fill: #C7912B;
            animation: ring-animation 0.6s ease infinite;
        }

        @keyframes ring-animation {
            0% { transform: rotate(0); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
            100% { transform: rotate(0); }
        }

        .pitch-info {
            font-size: 9px;
            color: #bbb;
            margin-top: -4px;
        }
    </style>
</head>
<body>

<script>
    // --- SEKRETY I HASŁO ---
    const poprawneHaslo = "Betadzwonnykieczyński";
    let autoryzowany = false;

    while (!autoryzowany) {
        let wpisane = prompt("Wpisz Hasło:");
        
        if (wpisane === poprawneHaslo) {
            autoryzowany = true;
            document.body.style.display = "block"; // Pokazuje stronę
        } else {
            alert("Błędny kod!");
            // Pętla while sprawi, że prompt wyskoczy ponownie
        }
    }
</script>

<div class="konfigurator-container">
    <div class="konfigurator-header">
        <svg viewBox="0 0 24 24" width="50" height="50" fill="#C7912B"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <h3>POSŁUCHAJ ZESTAWÓW HARMONICZNYCH</h3>
    </div>

    <div id="konfiguratorDzwiekow" class="grupa-dzwieku"></div>
</div>

<script>
    // --- LOGIKA DŹWIĘKU ---
    const wagi = [20, 25, 30, 35, 40, 45, 50, 60, 70, 80, 90, 100, 130, 150, 190, 220, 260, 290, 350, 420, 500, 580, 700, 800, 970, 1200, 1450, 1650, 1950, 2400, 2800, 3360, 4000, 4640, 5600, 6400, 7760, 9600, 11500];
    const container = document.getElementById('konfiguratorDzwiekow');
    const grajaceInstance = {};

    wagi.forEach(waga => {
        const btn = document.createElement('button');
        btn.className = 'bell-btn';
        
        const minWaga = Math.log(20);
        const maxWaga = Math.log(11500);
        const aktualnaWaga = Math.log(waga);
        
        const pitch = 2.0 - ((aktualnaWaga - minWaga) / (maxWaga - minWaga)) * (2.0 - 0.4);

        btn.innerHTML = `
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span>${waga} kg</span>
            <span class="pitch-info">Ton: ${pitch.toFixed(2)}</span>
        `;

        btn.onclick = () => {
            if (grajaceInstance[waga]) {
                grajaceInstance[waga].pause();
                grajaceInstance[waga].currentTime = 0;
                delete grajaceInstance[waga];
                btn.classList.remove('aktywny');
            } else {
                const audio = new Audio('dzwon.mp3');
                audio.loop = true;
                audio.preservesPitch = false; 
                audio.playbackRate = pitch;
                
                audio.play().then(() => {
                    grajaceInstance[waga] = audio;
                    btn.classList.add('aktywny');
                }).catch(e => console.log("Interakcja wymagana"));
            }
        };

        container.appendChild(btn);
    });
</script>

</body>
</html>
