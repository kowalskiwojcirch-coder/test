<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

    .konfigurator-container {
        font-family: 'Montserrat', sans-serif;
        max-width: 1000px;
        margin: 0 auto;
        text-align: center;
        padding: 20px;
    }

    .konfigurator-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 30px;
    }

    .konfigurator-header h3 {
        color: #4A4A4A;
        font-size: 1.2rem;
        letter-spacing: 1px;
        margin-top: 10px;
    }

    .grupa-dzwieku {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 12px;
        justify-content: center;
    }

    .bell-btn {
        background: #ffffff;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        padding: 12px 8px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
        color: #4A4A4A;
        font-weight: 400;
    }

    .bell-btn:hover {
        border-color: #C7912B;
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .bell-btn svg {
        width: 24px;
        height: 24px;
        fill: #999;
        transition: fill 0.3s ease;
    }

    .bell-btn.aktywny {
        border-color: #C7912B;
        background-color: #fffdf7;
        font-weight: 600;
        color: #C7912B;
    }

    .bell-btn.aktywny svg {
        fill: #C7912B;
        animation: ring 0.5s ease infinite; /* Zapętlenie animacji dzwonienia */
    }

    @keyframes ring {
        0% { transform: rotate(0); }
        25% { transform: rotate(15deg); }
        50% { transform: rotate(-15deg); }
        75% { transform: rotate(10deg); }
        100% { transform: rotate(0); }
    }
</style>

<div class="konfigurator-container">
    <div class="konfigurator-header">
        <svg viewBox="0 0 24 24" width="50" height="50" fill="#C7912B"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <h3>POSŁUCHAJ ZESTAWÓW HARMONICZNYCH</h3>
    </div>

    <div id="konfiguratorDzwiekow" class="grupa-dzwieku"></div>
</div>

<script>
    const wagi = [20, 25, 30, 35, 40, 45, 50, 60, 70, 80, 90, 100, 130, 150, 190, 220, 260, 290, 350, 420, 500, 580, 700, 800, 970, 1200, 1450, 1650, 1950, 2400, 2800, 3360, 4000, 4640, 5600, 6400, 7760, 9600, 11500];
    const container = document.getElementById('konfiguratorDzwiekow');
    const plikDzwonu = 'dzwon.mp3'; // Twoja nazwa pliku
    
    var dzwieki = {};

    wagi.forEach(waga => {
        const btn = document.createElement('button');
        btn.className = 'bell-btn';
        
        // Obliczanie prędkości (playbackRate) na podstawie wagi
        // Im większa waga, tym wolniejszy (niższy) dźwięk
        let speed = 1.0;
        if (waga <= 100) speed = 1.6;
        else if (waga <= 500) speed = 1.2;
        else if (waga <= 2000) speed = 0.8;
        else speed = 0.5;

        btn.onclick = () => toggleDzwiek(waga, speed, btn);
        btn.innerHTML = `
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span>${waga} kg</span>
        `;
        container.appendChild(btn);
    });

    function toggleDzwiek(id, szybkosc, przycisk) {
        if (dzwieki[id]) {
            zatrzymajDzwiek(id, przycisk);
        } else {
            // Tworzymy nową instancję dzwonu
            const audio = new Audio(plikDzwonu); 
            audio.loop = true;
            audio.playbackRate = szybkosc; // Ustawienie szybkości dzwonienia
            
            audio.play().then(() => {
                dzwieki[id] = audio;
                przycisk.classList.add('aktywny');
            }).catch(err => {
                console.error("Błąd odtwarzania dzwon.mp3. Upewnij się, że plik jest w tym samym folderze co index.html.");
            });
        }
    }

    function zatrzymajDzwiek(id, przycisk) {
        if (dzwieki[id]) {
            dzwieki[id].pause();
            dzwieki[id].currentTime = 0;
            delete dzwieki[id];
            przycisk.classList.remove('aktywny');
        }
    }
</script>
