<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon MIDI Piano</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

button {
    padding: 12px 20px;
    margin: 20px;
    font-size: 16px;
    background: #C7912B;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.piano {
    position: relative;
    width: 1000px;
    height: 200px;
    margin: auto;
}

.white {
    width: 40px;
    height: 200px;
    background: white;
    border: 1px solid #ccc;
    float: left;
    position: relative;
    z-index: 1;
}

.black {
    width: 25px;
    height: 120px;
    background: black;
    position: absolute;
    z-index: 2;
    margin-left: -12px;
}

.active {
    background: #C7912B !important;
}
</style>
</head>

<body>

<h2>🎹 Carillon MIDI</h2>
<button onclick="connectMIDI()">🔌 Podłącz keyboard (MIDI)</button>

<div id="piano" class="piano"></div>

<script>
const baseFile = "C'''.mp3";
const activeNotes = {};

const piano = document.getElementById("piano");

// MIDI zakres (np 48–84 = 3 oktawy)
const startNote = 48;
const endNote = 84;

const whiteNotes = [0,2,4,5,7,9,11];

let keyMap = {};

function createPiano() {
    let whiteIndex = 0;

    for (let i = startNote; i <= endNote; i++) {

        const note = i % 12;

        if (whiteNotes.includes(note)) {
            const key = document.createElement("div");
            key.className = "white";
            key.dataset.note = i;
            piano.appendChild(key);

            keyMap[i] = key;

            whiteIndex++;

        } else {
            const key = document.createElement("div");
            key.className = "black";
            key.dataset.note = i;

            key.style.left = (whiteIndex * 40 - 12) + "px";

            piano.appendChild(key);
            keyMap[i] = key;
        }
    }
}

createPiano();

// --- AUDIO ---
function playNote(note, velocity=1) {
    const pitch = Math.pow(2, (note - 60) / 12);

    const audio = new Audio(baseFile);
    audio.playbackRate = pitch;
    audio.volume = velocity;
    audio.preservesPitch = false;

    audio.play();

    activeNotes[note] = audio;

    if (keyMap[note]) keyMap[note].classList.add("active");
}

function stopNote(note) {
    if (activeNotes[note]) {
        activeNotes[note].pause();
        delete activeNotes[note];
    }
    if (keyMap[note]) keyMap[note].classList.remove("active");
}

// --- MIDI ---
function connectMIDI() {
    if (!navigator.requestMIDIAccess) {
        alert("Brak wsparcia MIDI w przeglądarce (użyj Chrome)");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {
        const inputs = midi.inputs.values();

        for (let input of inputs) {
            input.onmidimessage = (msg) => {
                const [cmd, note, velocity] = msg.data;

                if (cmd === 144 && velocity > 0) {
                    playNote(note, velocity / 127);
                } else if (cmd === 128 || velocity === 0) {
                    stopNote(note);
                }
            };
        }

        alert("Keyboard podłączony 🎹");
    });
}
</script>

</body>
</html>
