<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfigurator Dzwonów</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

        body { background-color: #f4f4f4; display: flex; justify-content: center; padding: 20px; }

        .bell-wrapper {
            font-family: 'Montserrat', sans-serif;
            max-width: 1000px;
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header-box h2 { color: #C7912B; margin-bottom: 5px; }
        .header-box p { color: #666; font-size: 14px; margin-bottom: 25px; }

        .bell-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }

        .bell-card {
            background: #fff;
            border: 2px solid #eaeaea;
            border-radius: 10px;
            padding: 15px 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bell-card:hover { border-color: #C7912B; background: #fafafa; }

        .bell-icon { width: 30px; height: 30px; fill: #ccc; transition: fill 0.3s; }

        /* Aktywny dzwon */
        .bell-card.active {
            border-color: #C7912B;
            background: #fffdf2;
            box-shadow: 0 4px 12px rgba(199, 145, 43, 0.2);
        }

        .bell-card.active .bell-icon {
            fill: #C7912B;
            animation: ring 1s infinite;
        }

        .bell-card span { font-size: 14px; font-weight: 600; color: #333; }
        .speed-info { font-size: 10px; color: #999; }

        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }
    </style>
</head>
<body>

<div class="bell-wrapper">
    <div class="header-box">
        <h2>🔔 KONFIGURATOR HARMONICZNY</h2>
        <p>Kliknij wagę, aby usłyszeć dźwięk dzwonu w pętli.</p>
    </div>

    <div id="mainBellGrid" class="bell-grid"></div>
</div>

<script>
    // Lista wag
    const wagi = [20, 25, 30, 35, 40, 45, 50, 60, 70, 80, 90, 100, 130, 150, 190, 220, 260, 290, 350, 420, 500, 580, 700, 800, 970, 1200, 1450, 1650, 1950, 2400, 2800, 3360, 4000, 4640, 5600, 6400, 7760, 9600, 11500];
    
    // Bezpośredni link do czystego pliku MP3 dzwonu (z pewnego źródła)
    const BELL_URL = "https://www.soundjay.com/buttons/sounds/button-37.mp3";

    const activeSounds = {};
    const grid = document.getElementById('mainBellGrid');

    wagi.forEach(waga => {
        // Obliczanie szybkości (tonacji)
        // Małe wagi = szybko (wysoki ton), Duże wagi = wolno (niski ton)
        let rate = 1.0;
        if (waga < 100) rate = 1.6;
        else if (waga < 500) rate = 1.2;
        else if (waga < 2000) rate = 0.8;
        else rate = 0.5;

        const card = document.createElement('div');
        card.className = 'bell-card';
        card.innerHTML = `
            <svg class="bell-icon" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span>${waga} kg</span>
            <div class="speed-info">Ton: ${rate.toFixed(1)}x</div>
        `;

        card.onclick = function() {
            if (activeSounds[waga]) {
                // Wyłączanie:
                activeSounds[waga].pause();
                activeSounds[waga].currentTime = 0;
                delete activeSounds[waga];
                card.classList.remove('active');
            } else {
                // Włączanie:
                const audio = new Audio(BELL_URL);
                audio.loop = true;
                audio.playbackRate = rate; // ZMIANA TONACJI/SZYBKOŚCI
                
                // Obietnica (Promise) aby ominąć blokadę przeglądarki
                audio.play().then(() => {
                    activeSounds[waga] = audio;
                    card.classList.add('active');
                }).catch(e => console.error("Błąd odtwarzania:", e));
            }
        };

        grid.appendChild(card);
    });
</script>

</body>
</html>
