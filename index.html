<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Konfigurator Harmonii - Rejestr Basowy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap');

        body {
            display: none; 
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            user-select: none; 
            -webkit-user-select: none;
        }

        .konfigurator-container {
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .konfigurator-header h3 {
            color: #4A4A4A;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grupa-dzwieku {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
            justify-content: center;
        }

        .bell-btn {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .bell-btn:hover {
            border-color: #C7912B;
            background-color: #f9f9f9;
        }

        .bell-btn.aktywny {
            border-color: #C7912B;
            background-color: #fffdf2;
            color: #C7912B;
            font-weight: 600;
            box-shadow: 0 0 10px rgba(199, 145, 43, 0.2);
        }

        .note-info {
            font-size: 11px;
            color: #C7912B;
            font-weight: 700;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<script>
    // --- BLOKADY I HASŁO ---
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    const poprawneHaslo = "Betadzwonnykieczyński";
    let autoryzowany = false;

    while (!autoryzowany) {
        let wpisane = prompt("Wpisz Hasło:");
        if (wpisane === poprawneHaslo) {
            autoryzowany = true;
            document.body.style.display = "block";
        } else {
            alert("Błędny kod!");
        }
    }
</script>

<div class="konfigurator-container">
    <div class="konfigurator-header">
        <h3>HARMONIA DZWONÓW - NISKI REJESTR</h3>
    </div>
    <div id="konfiguratorDzwiekow" class="grupa-dzwieku"></div>
</div>

<script>
    const wagi = [20, 25, 30, 35, 40, 45, 50, 60, 70, 80, 90, 100, 130, 150, 190, 220, 260, 290, 350, 420, 500, 580, 700, 800, 970, 1200, 1450, 1650, 1950, 2400, 2800, 3360, 4000, 4640, 5600, 6400, 7760, 9600, 11500];
    const skalaDiatoniczna = ["C", "D", "E", "F", "G", "A", "H"];
    const poltonyMap = [0, 2, 4, 5, 7, 9, 11];
    const container = document.getElementById('konfiguratorDzwiekow');
    const grajaceInstance = {};

    // Sortujemy od największego dzwonu (Baza: 11500kg)
    const posortowane = [...wagi].sort((a, b) => b - a);

    posortowane.forEach((waga, index) => {
        const btn = document.createElement('button');
        btn.className = 'bell-btn';
        
        // BAZA: 11500kg (index 0) zaczyna od playbackRate = 0.5 (bardzo niski bas)
        const bazaPlayback = 0.5; 
        
        const oktawa = Math.floor(index / 7);
        const pozycjaWSkali = index % 7;
        const sumaPoltonow = (oktawa * 12) + poltonyMap[pozycjaWSkali];
        
        // Wyliczamy pitch zaczynając od 0.5x
        const pitch = bazaPlayback * Math.pow(2, sumaPoltonow / 12);

        btn.innerHTML = `
            <span>${waga} kg</span>
            <span class="note-info">${skalaDiatoniczna[pozycjaWSkali]}</span>
        `;

        btn.onclick = () => {
            if (grajaceInstance[waga]) {
                grajaceInstance[waga].pause();
                grajaceInstance[waga].currentTime = 0;
                delete grajaceInstance[waga];
                btn.classList.remove('aktywny');
            } else {
                const audio = new Audio('dzwon.mp3');
                audio.loop = true;
                audio.preservesPitch = false; 
                audio.playbackRate = pitch;
                audio.play().then(() => {
                    grajaceInstance[waga] = audio;
                    btn.classList.add('aktywny');
                });
            }
        };
        // Prepend: małe wagi lądują na początku listy wizualnej
        container.prepend(btn);
    });
</script>
</body>
</html>
